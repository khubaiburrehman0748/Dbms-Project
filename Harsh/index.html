<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailConnect - Pakistan Railways</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
    </style>
</head>

<body
    class="text-gray-800 dark:text-gray-100 bg-f3f4f6 dark:bg-gray-900 h-screen flex flex-col overflow-hidden transition-colors duration-200">

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>

    <div id="modal-container" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title"
        role="dialog" aria-modal="true"></div>

    <nav class="bg-slate-900 dark:bg-slate-950 text-white shadow-lg z-40 transition-colors duration-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.reload()">
                    <i class="fa-solid fa-train-subway text-green-500 text-2xl"></i>
                    <span class="font-bold text-xl tracking-tight">RailConnect</span>
                </div>
                <div class="flex items-center gap-4">
                    <div id="nav-links" class="flex space-x-4"></div>
                    <button onclick="toggleTheme()" class="text-gray-300 hover:text-white focus:outline-none">
                        <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main id="app-root"
        class="flex-1 overflow-hidden p-0 relative bg-white dark:bg-gray-900 transition-colors duration-200 h-full">
    </main>

    <script>
        const API_URL = 'http://127.0.0.1:5000/api';

        const state = {
            currentUser: null,
            trains: [],
            users: [],
            bookings: [],
            stations: ['Karachi', 'Lahore', 'Islamabad', 'Rawalpindi', 'Peshawar', 'Quetta', 'Multan', 'Faisalabad', 'Hyderabad'],
            currentEditTrainId: null
        };

        // --- API FUNCTIONS ---
        async function fetchTrains() {
            try {
                const res = await fetch(`${API_URL}/trains`);
                state.trains = await res.json();
            } catch (e) { console.error("Failed to fetch trains", e); }
        }

        async function fetchUsers() {
            try {
                const res = await fetch(`${API_URL}/users`);
                state.users = await res.json();
            } catch (e) { console.error("Failed to fetch users", e); }
        }

        async function fetchMyBookings() {
            if (!state.currentUser) return;
            try {
                const res = await fetch(`${API_URL}/bookings/${state.currentUser.user_id}`);
                state.bookings = await res.json();
            } catch (e) { console.error("Failed to fetch bookings", e); }
        }

        document.addEventListener('DOMContentLoaded', () => { renderMainLayout(); });

        function renderHome() {
            if (state.currentUser?.role === 'admin') { renderAdminDashboard(); }
            else if (state.currentUser?.role === 'passenger') { renderPassengerDashboard(); }
            else { renderMainLayout(); }
        }

        // ==========================================
        //  SPLIT-SCREEN ARCHITECTURE
        // ==========================================

        function renderMainLayout() {
            document.getElementById('app-root').innerHTML = `
                <div class="flex h-full w-full">
                    <div class="hidden md:block md:w-1/2 h-full relative bg-cover bg-center" style="background-image: url('Image01.jpg');">
                        <div class="absolute inset-0 bg-gradient-to-r from-black/60 to-black/30"></div>
                        <div class="absolute bottom-10 left-10 p-8 text-white z-10">
                            <h1 class="text-5xl font-bold mb-4 leading-tight">Pakistan Railways</h1>
                            <p class="text-xl text-gray-200 font-light">Connect with the nation. Experience seamless travel.</p>
                        </div>
                    </div>

                    <div class="w-full md:w-1/2 h-full bg-white dark:bg-gray-900 flex flex-col justify-center items-center p-8 md:p-16 transition-colors duration-200 relative overflow-y-auto">
                        <div id="auth-content" class="w-full max-w-sm fade-in">
                            </div>
                        
                        <div class="absolute bottom-6 text-xs text-gray-400 dark:text-gray-600">
                            &copy; 2026 RailConnect System
                        </div>
                    </div>
                </div>`;

            // Load the default view
            renderAuthOptions();
            updateNav();
        }

        function renderAuthOptions() {
            const container = document.getElementById('auth-content');
            container.innerHTML = `
                <div class="text-center mb-10 fade-in">
                    <div class="w-20 h-20 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-6 transition-colors duration-200">
                        <i class="fa-solid fa-train-subway text-4xl text-green-600 dark:text-green-400"></i>
                    </div>
                    <h2 class="text-3xl font-bold text-gray-900 dark:text-white">Welcome Back</h2>
                    <p class="text-gray-500 dark:text-gray-400 mt-2">Please select your login type</p>
                </div>

                <div class="flex flex-col gap-4 fade-in">
                    <button onclick="renderLoginForm('passenger')" class="w-full group relative flex items-center justify-center py-4 px-6 bg-green-600 hover:bg-green-700 rounded-xl text-white shadow-lg transition-all transform hover:-translate-y-0.5 font-semibold text-lg">
                        <span class="absolute left-6"><i class="fa-solid fa-user text-green-200"></i></span>
                        Login as Passenger
                    </button>

                    <button onclick="renderLoginForm('admin')" class="w-full group relative flex items-center justify-center py-4 px-6 border-2 border-gray-200 dark:border-gray-700 hover:border-gray-400 dark:hover:border-gray-500 rounded-xl text-gray-700 dark:text-gray-200 bg-transparent hover:bg-gray-50 dark:hover:bg-gray-800 transition-all font-semibold text-lg">
                        <span class="absolute left-6"><i class="fa-solid fa-shield-halved text-gray-400 dark:text-gray-500"></i></span>
                        Login as Admin
                    </button>
                </div>

                <div class="mt-8 text-center fade-in">
                    <p class="text-gray-600 dark:text-gray-400">
                        Don't have an account? 
                        <button onclick="renderRegisterPage()" class="text-green-600 hover:text-green-700 dark:text-green-400 dark:hover:text-green-300 font-semibold hover:underline ml-1 focus:outline-none">
                            Create one
                        </button>
                    </p>
                </div>
            `;
        }

        function renderLoginForm(type) {
            const container = document.getElementById('auth-content');
            const title = type === 'admin' ? 'Admin Login' : 'Passenger Sign In';

            container.innerHTML = `
                <div class="fade-in">
                    <button onclick="renderAuthOptions()" class="mb-8 text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-arrow-left text-xl"></i> <span class="text-sm font-medium">Back</span>
                    </button>

                    <div class="text-center mb-8">
                        <h2 class="text-3xl font-bold text-gray-900 dark:text-white">${title}</h2>
                        <p class="text-gray-500 dark:text-gray-400 mt-2">Enter your credentials to continue</p>
                    </div>

                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username / ID</label>
                            <input type="text" id="login-username" class="w-full p-3.5 rounded-xl border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-green-500 dark:bg-gray-800 dark:text-white transition-all" placeholder="Enter username">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                            <input type="password" id="login-password" class="w-full p-3.5 rounded-xl border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-green-500 dark:bg-gray-800 dark:text-white transition-all" placeholder="Enter password">
                        </div>
                        <button onclick="handleLogin('${type}')" class="w-full py-3.5 px-4 rounded-xl text-white bg-green-600 hover:bg-green-700 font-semibold shadow-md hover:shadow-lg transition-all">
                            Login
                        </button>
                    </div>
                </div>
            `;
        }

        function renderRegisterPage() {
            const root = document.getElementById('app-root');
            root.innerHTML = `
                <div class="flex h-full w-full fade-in">
                    <div class="w-full md:w-1/2 h-full bg-white dark:bg-gray-900 flex items-center justify-center p-8 overflow-y-auto transition-colors duration-200">
                        <div class="w-full max-w-md">
                            <button onclick="renderMainLayout()" class="mb-6 text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white transition-colors flex items-center gap-2">
                                <i class="fa-solid fa-arrow-left"></i> Back
                            </button>
                            
                            <div class="mb-8">
                                <h2 class="text-3xl font-bold text-gray-900 dark:text-white">Start Your Journey</h2>
                                <p class="text-gray-500 dark:text-gray-400 mt-2">Create your new passenger account</p>
                            </div>

                            <div class="space-y-4">
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-1">Full Name</label>
                                    <input type="text" id="r-name" class="w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 dark:text-white p-2.5 focus:ring-2 focus:ring-green-500 outline-none transition-all">
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-1">Email Address</label>
                                    <input type="email" id="r-email" class="w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 dark:text-white p-2.5 focus:ring-2 focus:ring-green-500 outline-none transition-all">
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-1">Age</label>
                                        <input type="number" id="r-age" class="w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 dark:text-white p-2.5 focus:ring-2 focus:ring-green-500 outline-none transition-all">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-1">CNIC No</label>
                                        <input type="text" id="r-cnic" maxlength="13" class="w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 dark:text-white p-2.5 focus:ring-2 focus:ring-green-500 outline-none transition-all" placeholder="13 Digits">
                                </div>
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-1">Username</label>
                                    <input type="text" id="r-username" class="w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 dark:text-white p-2.5 focus:ring-2 focus:ring-green-500 outline-none transition-all">
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-1">Password</label>
                                    <input type="password" id="r-password" class="w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 dark:text-white p-2.5 focus:ring-2 focus:ring-green-500 outline-none transition-all" placeholder="Upper, Lower & Number">
                                </div>
                                <button onclick="handleRegister()" class="w-full mt-2 py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-green-600 hover:bg-green-700 transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                                    Register Now
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="hidden md:block md:w-1/2 h-full relative bg-cover bg-center" style="background-image: url('Image02.jpg');">
                        <div class="absolute inset-0 bg-black/10"></div>
                        <div class="absolute bottom-10 right-10 text-right text-white p-6">
                            <h2 class="text-3xl font-bold">Fast & Secure</h2>
                            <p class="text-gray-200">Join thousands of passengers today.</p>
                        </div>
                    </div>
                </div>`;
        }

        // ==========================================
        //  DASHBOARDS & CORE LOGIC
        // ==========================================

        async function renderPassengerDashboard() {
            await fetchTrains();
            await fetchMyBookings();

            const stationOptions = state.stations.map(s => `<option value="${s}">${s}</option>`).join('');

            document.getElementById('app-root').innerHTML = `
                <div class="max-w-6xl mx-auto fade-in space-y-8 p-4 sm:p-8 h-full overflow-y-auto">
                    <div class="bg-slate-900 p-6 sm:p-10 text-white bg-cover bg-center rounded-2xl" style="background-image: url('https://images.unsplash.com/photo-1474487548417-781cb71495f3');">
                        <h1 class="text-3xl font-bold mb-8 relative z-10">Find Your Next Journey</h1>
                        <div class="bg-white/10 backdrop-blur-md p-4 rounded-xl border border-white/20 relative z-10">
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <select id="search-source" class="w-full bg-slate-800 rounded-lg px-3 py-2"><option value="">From</option>${stationOptions}</select>
                                <select id="search-dest" class="w-full bg-slate-800 rounded-lg px-3 py-2"><option value="">To</option>${stationOptions}</select>
                                <input type="text" id="search-date" placeholder="DD/MM/YYYY" class="w-full bg-slate-800 rounded-lg px-3 py-2">
                                <button id="search-btn" class="w-full bg-green-600 hover:bg-green-500 rounded-lg py-2">Search</button>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-end mt-4">
                        <select id="price-sort" class="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 text-sm text-gray-700 dark:text-gray-200 outline-none focus:ring-2 focus:ring-green-500 shadow-sm">
                            <option value="">Sort by Price</option>
                            <option value="low">Price: Low → High</option>
                            <option value="high">Price: High → Low</option>
                        </select>
                    </div>

                    <div id="train-list" class="grid grid-cols-1 gap-4 mt-3"></div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 border dark:border-gray-700">
                            <h3 class="font-bold mb-4 text-gray-800 dark:text-white">Check PNR Status</h3>
                            <input type="text" id="pnr-input" placeholder="Enter PNR" class="w-full border rounded-lg px-4 py-2 mb-3 dark:bg-gray-700 dark:text-white">
                            <button onclick="checkPNR()" class="w-full bg-slate-900 text-white py-2 rounded-lg">Check</button>
                            <div id="pnr-result" class="mt-4 text-sm"></div>
                        </div>
                        <div class="md:col-span-2 bg-white dark:bg-gray-800 rounded-2xl p-6 border dark:border-gray-700">
                            <h3 class="font-bold mb-4 text-gray-800 dark:text-white">My Bookings</h3>
                            <div>
                                ${state.bookings.length ? state.bookings.map(b => `
                                    <div class="border-b py-3 dark:border-gray-700 flex justify-between items-center">
                                        <div>
                                            <span class="text-gray-800 dark:text-gray-200 font-medium block">${b.train_name} (${b.train_number})</span>
                                            <span class="text-gray-500 text-sm">PNR: ${b.pnr} | ${b.class_type} | Seat: ${b.seat_number}</span>
                                        </div>
                                        <span class="text-xs bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded text-gray-600 dark:text-gray-300">
                                            ${b.booking_date ? formatDate(b.booking_date) : ''}
                                        </span>
                                    </div>
                                `).join('') : '<p class="text-gray-500">No bookings found.</p>'}
                            </div>
                        </div>
                    </div>
                </div>`;

            // Initialize flatpickr for search-date
            flatpickr("#search-date", {
                altInput: true,
                altFormat: "d/m/Y",
                dateFormat: "Y-m-d",
                minDate: "today"
            });

            renderTrainsList();

            // Attach event listeners programmatically (more reliable than inline handlers)
            document.getElementById('price-sort').addEventListener('change', function () {
                console.log("Price sort changed to:", this.value);
                renderTrainsList();
            });
            document.getElementById('search-btn').addEventListener('click', function () {
                console.log("Search button clicked.");
                renderTrainsList();
            });
            console.log("Passenger Dashboard rendered.");
        }

        function renderTrainsList() {
            const sortSelect = document.getElementById('price-sort');
            const sortVal = sortSelect ? sortSelect.value : '';
            let trains = [...state.trains];

            // Filter by search fields if populated
            const srcEl = document.getElementById('search-source');
            const destEl = document.getElementById('search-dest');
            const dateEl = document.getElementById('search-date');
            const src = srcEl ? srcEl.value : '';
            const dest = destEl ? destEl.value : '';
            const date = dateEl ? dateEl.value : '';
            if (src) trains = trains.filter(t => t.source === src);
            if (dest) trains = trains.filter(t => t.dest === dest);
            if (date) trains = trains.filter(t => t.date === date);

            // Get the lowest available price for sorting
            function getLowestPrice(t) {
                const prices = [];
                if (parseFloat(t.total_seats_economy) > 0) prices.push(parseFloat(t.price_economy));
                if (parseFloat(t.total_seats_business) > 0) prices.push(parseFloat(t.price_business));
                if (parseFloat(t.total_seats_first) > 0) prices.push(parseFloat(t.price_first));
                return prices.length > 0 ? Math.min(...prices) : Infinity;
            }

            if (sortVal === 'low') {
                trains.sort((a, b) => getLowestPrice(a) - getLowestPrice(b));
            } else if (sortVal === 'high') {
                trains.sort((a, b) => getLowestPrice(b) - getLowestPrice(a));
            }
            console.log('Sort:', sortVal, 'ordered trains:', trains.map(t => `${t.name || t.train_name || t.train_number}: ${getLowestPrice(t)}`).join(' | '));


        }

        async function renderAdminDashboard() {
            await fetchTrains();
            await fetchUsers();

            document.getElementById('app-root').innerHTML = `
                <div class="relative w-full h-full fade-in bg-gray-50 dark:bg-gray-900">
                    <div class="absolute inset-0 z-0 opacity-10" style="background-image: url('image_d5217c.png'); background-size: cover; background-position: center;"></div>
                    
                    <div class="relative z-10 max-w-7xl mx-auto space-y-6 p-4 sm:p-8 h-full overflow-y-auto">

                            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Admin Dashboard</h1>

                                <p class="text-2xl font-bold text-gray-900 dark:text-white">${state.users.length}</p>
                            </div>
                            <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border dark:border-gray-700">
                                <p class="text-gray-500 text-sm">System Status</p>
                                <p class="text-2xl font-bold text-emerald-500">Operational</p>
                            </div>
                        </div>

                        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border dark:border-gray-700 overflow-hidden">
                            <div class="p-4 border-b dark:border-gray-700 bg-gray-50 dark:bg-gray-800"><h3 class="font-bold text-gray-700 dark:text-gray-200">Train Schedule</h3></div>
                            <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm text-gray-700 dark:text-gray-300">
                                <thead class="bg-gray-50 dark:bg-gray-700"><tr><th class="px-6 py-3">Number/Name</th><th class="px-6 py-3">Route</th><th class="px-6 py-3">Date/Time</th><th class="px-6 py-3">Economy</th><th class="px-6 py-3">Business</th><th class="px-6 py-3">First Class</th><th class="px-6 py-3">Actions</th></tr></thead>
                                <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
                                    ${state.trains.map(t => `<tr>
                                        <td class="px-6 py-4"><strong>${t.number}</strong><br><span class="text-sm text-gray-500">${t.name}</span></td>
                                        <td class="px-6 py-4">${t.source}<br>to ${t.dest}</td>
                                        <td class="px-6 py-4">${t.date ? formatDate(t.date) : 'Daily'}<br><span class="text-sm text-gray-500">${t.time}</span></td>
                                        <td class="px-6 py-4">
                                            ${t.total_seats_economy > 0 ? `<span class="font-semibold ${t.seats_economy < 10 ? 'text-red-600' : 'text-green-600'}">${t.seats_economy}/${t.total_seats_economy}</span><br><span class="text-xs text-gray-500">PKR ${t.price_economy}</span>` : '<span class="text-xs text-gray-400">N/A</span>'}
                                        </td>
                                        <td class="px-6 py-4">
                                            ${t.total_seats_business > 0 ? `<span class="font-semibold ${t.seats_business < 10 ? 'text-red-600' : 'text-green-600'}">${t.seats_business}/${t.total_seats_business}</span><br><span class="text-xs text-gray-500">PKR ${t.price_business}</span>` : '<span class="text-xs text-gray-400">N/A</span>'}
                                        </td>
                                        <td class="px-6 py-4">
                                            ${t.total_seats_first > 0 ? `<span class="font-semibold ${t.seats_first < 10 ? 'text-red-600' : 'text-green-600'}">${t.seats_first}/${t.total_seats_first}</span><br><span class="text-xs text-gray-500">PKR ${t.price_first}</span>` : '<span class="text-xs text-gray-400">N/A</span>'}
                                        </td>

        function renderTrainCard(train) {
            const delayText = train.delay > 0 ? `<span class="text-red-500 text-xs font-bold ml-2"><i class="fa-solid fa-triangle-exclamation"></i> Delayed ${train.delay} min</span>` : '<span class="text-green-500 text-xs font-bold ml-2">On Time</span>';

            // Time Check: See if train has already departed
            let hasDeparted = false;
            try {
                if (train.date && train.time) {
                    const dParts = train.date.split('-');
                    const tParts = train.time.split(':');
                    if (dParts.length >= 3 && tParts.length >= 2) {
                        const trainDateTime = new Date(
                            parseInt(dParts[0], 10),
                            parseInt(dParts[1], 10) - 1,   // month is 0-indexed
                            parseInt(dParts[2], 10),
                            parseInt(tParts[0], 10),
                            parseInt(tParts[1], 10),
                            0
                        );
                        // Strict comparison using UNIX timestamps to guarantee local time alignment
                        if (trainDateTime.getTime() < new Date().getTime()) {
                            hasDeparted = true;
                        }
                    }
                }
            } catch (e) {
                console.error("Time logic error: ", e);
            }

            // Helper configuration for the three classes
            const classes = [
                { id: 'Economy', name: 'Economy', seats: train.seats_economy, totalSeats: train.total_seats_economy, price: train.price_economy, color: 'blue' },
                { id: 'Business', name: 'Business', seats: train.seats_business, totalSeats: train.total_seats_business, price: train.price_business, color: 'purple' },
                { id: 'First', name: 'First Class', seats: train.seats_first, totalSeats: train.total_seats_first, price: train.price_first, color: 'amber' }
            ];

            // Filter out classes that are not enabled (total_seats is 0)
            const enabledClasses = classes.filter(c => c.totalSeats > 0);

            const classButtonsHTML = enabledClasses.map(c => {
                const hasSeats = c.seats > 0;
                const isAvailable = hasSeats && !hasDeparted;

                let statusText = isAvailable ? c.seats + ' Seats Left' : 'Full';
                let btnText = isAvailable ? 'Book' : 'Sold Out';

                if (hasDeparted) {
                    statusText = 'Departed';
                    btnText = 'Departed';
                }

                return `
                <div class="flex-1 min-w-[120px] border border-${c.color}-200 dark:border-${c.color}-900 bg-${c.color}-50 dark:bg-${c.color}-900/10 rounded-lg p-3 text-center opacity-${hasDeparted ? '60' : '100'}">
                    <div class="text-xs font-bold text-${c.color}-700 dark:text-${c.color}-400 uppercase tracking-wide">${c.name}</div>
                    <div class="text-lg font-bold text-gray-900 dark:text-white mt-1">PKR ${c.price}</div>
                    <div class="text-xs ${isAvailable ? 'text-green-600' : 'text-red-500'} font-medium mb-3">${statusText}</div>
                    <button 
                        ${!isAvailable ? 'disabled' : ''} 
                        onclick="bookTrain(${train.train_id}, '${c.id}')" 
                        class="w-full text-sm py-1.5 rounded-md text-white ${isAvailable ? `bg-${c.color}-600 hover:bg-${c.color}-700 shadow-sm transition-colors` : 'bg-gray-400 cursor-not-allowed'}"
                    >
                        ${btnText}
                    </button>
                </div>`;
            }).join('');

            return `
                <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5 flex flex-col hover:shadow-md transition-shadow">
                    <div class="flex flex-col sm:flex-row justify-between mb-4 border-b border-gray-100 dark:border-gray-700 pb-4">
                        <div>
                            <h4 class="font-bold text-xl text-gray-900 dark:text-white flex items-center">
                                ${train.name} <span class="text-sm font-mono text-green-700 bg-green-100 dark:bg-green-900/30 px-2 py-0.5 rounded ml-3 border border-green-200">${train.number}</span>
                            </h4>
                            <div class="text-sm font-medium text-gray-600 dark:text-gray-400 mt-2 flex items-center gap-3">
                                <span><i class="fa-solid fa-location-dot text-gray-400"></i> ${train.source}</span>
                                <i class="fa-solid fa-arrow-right-long text-gray-300"></i>
                                <span><i class="fa-solid fa-location-dot text-gray-400"></i> ${train.dest}</span>
                            </div>
                        </div>
                        <div class="text-left sm:text-right mt-3 sm:mt-0">
                            <div class="text-sm text-gray-500"><i class="fa-regular fa-clock"></i> ${train.time}</div>
                            <div class="mt-1">${delayText}</div>
                        </div>
                    </div>
                    
                    <div class="flex flex-wrap gap-3 mt-2">
                        ${classButtonsHTML}
                    </div>
                </div>`;
        }

        function toggleClassInputs() {
            const ecoChecked = document.getElementById('nt-eco-check')?.checked;
            const busChecked = document.getElementById('nt-bus-check')?.checked;
            const firstChecked = document.getElementById('nt-first-check')?.checked;
            const ecoFields = document.getElementById('eco-fields');
            const busFields = document.getElementById('bus-fields');
            const firstFields = document.getElementById('first-fields');
            if (ecoFields) ecoFields.style.display = ecoChecked ? 'block' : 'none';
            if (busFields) busFields.style.display = busChecked ? 'block' : 'none';
            if (firstFields) firstFields.style.display = firstChecked ? 'block' : 'none';

        function submitTrainForm() {
            const num = document.getElementById('nt-num').value;
            const name = document.getElementById('nt-name').value;
            const src = document.getElementById('nt-source').value;
            const dest = document.getElementById('nt-dest').value;
            const date = document.getElementById('nt-date').value;
            const time = document.getElementById('nt-time').value;

            const eco_seats = document.getElementById('nt-eco-seats').value;
            const eco_price = document.getElementById('nt-eco-price').value;
            const bus_seats = document.getElementById('nt-bus-seats').value;
            const bus_price = document.getElementById('nt-bus-price').value;
            const first_seats = document.getElementById('nt-first-seats').value;
            const first_price = document.getElementById('nt-first-price').value;

            const ecoEnabled = document.getElementById('nt-eco-check')?.checked;
            const busEnabled = document.getElementById('nt-bus-check')?.checked;
            const firstEnabled = document.getElementById('nt-first-check')?.checked;

            if (!num || !name || !src || !dest || !date || !time) {
                showToast("Please fill all required basic fields.", 'error');
                return;
            }

            if (!ecoEnabled && !busEnabled && !firstEnabled) {
                showToast("Please enable at least one class.", 'error');
                return;
            }

            const payload = {
                number: num,
                name: name,
                source: src,
                dest: dest,
                date: date,
                time: time,
                seats_economy: ecoEnabled ? (eco_seats || 0) : 0,
                price_economy: ecoEnabled ? (eco_price || 0) : 0,
                seats_business: busEnabled ? (bus_seats || 0) : 0,
                price_business: busEnabled ? (bus_price || 0) : 0,
                seats_first: firstEnabled ? (first_seats || 0) : 0,
                price_first: firstEnabled ? (first_price || 0) : 0,
                delay: 0,
                status: 'On Time'
            };

            const url = state.currentEditTrainId ? `${API_URL}/trains/edit/${state.currentEditTrainId}` : `${API_URL}/trains/add`;

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(res => res.json()).then(data => {
                if (data.success) {
                    showToast(state.currentEditTrainId ? "Train Updated Successfully" : "Train Added Successfully");
                    document.getElementById('modal-container').classList.add('hidden');
                    renderAdminDashboard();
                }
                else showToast("Operation failed", 'error');
            });
        }

        async function handleLogin(role) {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            const data = { username, password, role };

            try {
                const res = await fetch(`${API_URL}/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                const result = await res.json();
                if (result.success) {
                    state.currentUser = result.user;
                    updateNav();
                    role === 'admin' ? renderAdminDashboard() : renderPassengerDashboard();
                    showToast(`Welcome, ${result.user.full_name || 'User'}`);
                } else { showToast(result.message, 'error'); }
            } catch (e) { showToast("Connection Error", 'error'); }
        }

        async function handleRegister() {
            const name = document.getElementById('r-name').value;
            const email = document.getElementById('r-email').value;
            const age = document.getElementById('r-age').value;
            const cnic = document.getElementById('r-cnic').value;
            const username = document.getElementById('r-username').value;
            const password = document.getElementById('r-password').value;

            // 1. CNIC Validation (Only integers, exact length 13)
            const cnicRegex = /^\d{13}$/;
            if (!cnicRegex.test(cnic)) {
                showToast("CNIC must be exactly 13 numeric digits", 'error');
                return;
            }

            // 2. Password Validation (Upper, Lower, Number)
            const passwordRegex = /^(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{4,}$/;
            if (!passwordRegex.test(password)) {
                showToast("Password must have Uppercase, Lowercase & Number", 'error');
                return;
            }

            const data = { name, email, age, cnic, username, password };

            const res = await fetch(`${API_URL}/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            const result = await res.json();
            if (result.success) { showToast('Registration Successful!'); renderLoginForm('passenger'); }
            else showToast(result.message, 'error');
        }

        async function bookTrain(trainId, classType) {
            const pnr = 'PNR' + Math.floor(100000 + Math.random() * 900000);
            const data = {
                trainId: trainId,
                classType: classType,
                userId: state.currentUser.user_id,
                pnr: pnr,
                date: document.getElementById('search-date') ? document.getElementById('search-date').value : new Date().toISOString().split('T')[0],
                seat: Math.floor(Math.random() * 100) + 1
            };
            const res = await fetch(`${API_URL}/book`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            const result = await res.json();
            if (result.success) { showToast(`Booking Confirmed! PNR: ${pnr} (${classType})`); renderPassengerDashboard(); }
            else { showToast(result.message, 'error'); }
        }

        function logout() {
            state.currentUser = null;
            renderMainLayout(); // Go back to main options
        }

        function renderTrainsList() {
            const source = document.getElementById('search-source').value;
            const dest = document.getElementById('search-dest').value;
            const filtered = state.trains.filter(t => (!source || t.source === source) && (!dest || t.dest === dest));

            const container = document.getElementById('train-list');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="bg-white dark:bg-gray-800 p-8 text-center rounded-xl w-full col-span-full"><p class="text-gray-500 dark:text-gray-400 text-lg">No trains available for this route.</p></div>';
            } else {
                container.innerHTML = filtered.map(t => renderTrainCard(t)).join('');
            }
        }

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `${type === 'error' ? 'bg-red-500' : 'bg-green-500'} text-white px-6 py-3 rounded shadow-lg flex items-center gap-2 fade-in`;
            toast.innerHTML = `<span>${msg}</span>`;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const d = new Date(dateString);
            // Check if the date is valid before formatting
            if (isNaN(d.getTime())) {
                return dateString; // Return original string if date is invalid
            }
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
        }

        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
    </script>
</body>

</html>
